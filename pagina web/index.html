<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hajikorei - Portafolio & Enlaces</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=Orbitron:wght@700;900&family=Space+Grotesk:wght@500;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #030306;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* --- CANVAS INTERACTIVO (Optimizado) --- */
        #fx-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999; 
            pointer-events: none;
            will-change: transform;
        }

        /* --- CUADRÍCULA RETRO --- */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            background-image: 
                linear-gradient(rgba(168, 85, 247, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(168, 85, 247, 0.05) 1px, transparent 1px);
            background-size: 35px 35px;
        }

        /* --- CUBOS DE TETRIS (Acelerados por GPU) --- */
        .pixel-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .pixel {
            position: absolute;
            background: #00f2fe;
            box-shadow: 0 0 15px #00f2fe;
            animation: fall 5s linear infinite;
            top: -60px;
            opacity: 0.8;
            will-change: transform; /* Fuerza renderizado por GPU */
        }

        .pixel:nth-child(1) { width: 25px; height: 25px; background: #00f2fe; box-shadow: 0 0 15px #00f2fe; left: 10%; animation-delay: 0s; animation-duration: 5s; }
        .pixel:nth-child(2) { width: 50px; height: 25px; background: #ff007f; box-shadow: 0 0 15px #ff007f; left: 25%; animation-delay: 1.5s; animation-duration: 6.5s; }
        .pixel:nth-child(3) { width: 25px; height: 50px; background: #a855f7; box-shadow: 0 0 15px #a855f7; left: 45%; animation-delay: 3s; animation-duration: 4.5s; }
        .pixel:nth-child(4) { width: 50px; height: 50px; background: #ffeb3b; box-shadow: 0 0 15px #ffeb3b; left: 70%; animation-delay: 0.8s; animation-duration: 7s; }
        .pixel:nth-child(5) { width: 25px; height: 25px; background: #ff007f; box-shadow: 0 0 15px #ff007f; left: 85%; animation-delay: 4s; animation-duration: 5.5s; }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); }
            100% { transform: translateY(115vh) rotate(360deg); }
        }

        /* --- CONTENEDOR PRINCIPAL --- */
        .main-container {
            position: relative; 
            max-width: 440px; 
            width: 100%;
            z-index: 10;
            margin: auto; 
            display: flex;
            flex-direction: column;
        }

        /* --- PERSONAJE BOCCHI --- */
        .bocchi-character {
            position: absolute;
            left: calc(100% - 40px);
            bottom: -10px; 
            height: 620px; 
            width: auto;
            object-fit: contain;
            pointer-events: none;
            filter: drop-shadow(0 0 20px rgba(255, 0, 127, 0.25));
            animation: bocchiMicroFloat 6s ease-in-out infinite alternate; 
            z-index: -1; 
            will-change: transform;
        }

        @keyframes bocchiMicroFloat {
            0% { transform: translateY(2px) rotate(-0.3deg); }
            100% { transform: translateY(-3px) rotate(0.3deg); }
        }

        /* --- TARJETA PRINCIPAL --- */
        .profile-card {
            background: rgba(8, 9, 15, 0.88);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            width: 100%;
            padding: 40px 28px;
            text-align: center;
            border: 2px solid rgba(255, 0, 127, 0.5);
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            animation: neonGlow 4s ease-in-out infinite alternate;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: border-color, box-shadow;
        }

        @keyframes neonGlow {
            0% { box-shadow: 0 0 20px rgba(255, 0, 127, 0.3); border-color: rgba(255, 0, 127, 0.5); }
            100% { box-shadow: 0 0 40px rgba(0, 242, 254, 0.5); border-color: rgba(0, 242, 254, 0.6); }
        }

        .profile-badge {
            display: inline-block;
            font-family: 'Fira Code', monospace;
            font-size: 0.8rem;
            color: #00f2fe;
            background: rgba(0, 242, 254, 0.1);
            padding: 6px 14px;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(0, 242, 254, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .profile-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.3rem;
            font-weight: 900;
            color: #ffffff;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 16px;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.7);
            width: 100%;
        }

        .profile-description {
            font-size: 1.05rem;
            color: #cbd5e1;
            line-height: 1.6;
            margin-bottom: 35px;
            text-align: justify;
            background: rgba(255, 255, 255, 0.02);
            padding: 15px;
            border-radius: 12px;
            border-left: 3px solid #ff007f;
            width: 100%;
        }

        .profile-description span {
            color: #ff007f;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.5);
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }

        .btn-link {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            border-radius: 14px;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(14, 15, 24, 0.85);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease, background 0.3s ease, color 0.3s ease;
            will-change: transform, box-shadow;
        }

        .btn-link span, .btn-link i {
            transition: transform 0.3s ease;
        }

        .btn-link:hover { transform: scale(1.04); }
        .btn-link:hover span { transform: translateX(6px); }
        .btn-link:active { transform: scale(0.96); }

        /* Colores Redes */
        .tiktok { color: #00f2fe; box-shadow: inset 0 0 10px rgba(0, 242, 254, 0.15); }
        .tiktok:hover { background: #00f2fe; color: #000; box-shadow: 0 0 25px #00f2fe; }
        .instagram { color: #fe019a; box-shadow: inset 0 0 10px rgba(254, 1, 154, 0.15); }
        .instagram:hover { background: #fe019a; color: #fff; box-shadow: 0 0 25px #fe019a; }
        .facebook { color: #1877f2; box-shadow: inset 0 0 10px rgba(24, 119, 242, 0.15); }
        .facebook:hover { background: #1877f2; color: #fff; box-shadow: 0 0 25px #1877f2; }
        .discord { color: #5865F2; box-shadow: inset 0 0 10px rgba(88, 101, 242, 0.15); }
        .discord:hover { background: #5865F2; color: #fff; box-shadow: 0 0 25px #5865F2; }
        .twitter-x { color: #ffffff; box-shadow: inset 0 0 10px rgba(255, 255, 255, 0.05); }
        .twitter-x:hover { background: #ffffff; color: #000000; box-shadow: 0 0 25px #ffffff; }

        .btn-link i { font-size: 1.25rem; }

        /* --- RESPONSIVIDAD OPTIMIZADA --- */
        @media (max-width: 1200px) { .bocchi-character { height: 500px; left: calc(100% - 60px); } }
        @media (max-width: 992px) { .bocchi-character { height: 420px; left: calc(100% - 80px); } }

        @media (max-width: 768px) {
            body { padding: 20px 12px; }
            .profile-card { padding: 24px 16px; }
            .profile-title { font-size: 1.9rem; }
            .bocchi-character { 
                position: relative;
                left: auto;
                bottom: auto;
                height: 120px;
                width: auto;
                margin: 0 auto 15px auto;
                z-index: 5;
                order: -1;
                filter: drop-shadow(0 0 12px rgba(255, 0, 127, 0.4));
                animation: none; /* Desactivado en móviles para ahorrar batería y CPU */
            }
        }
    </style>
</head>
<body>

    <canvas id="fx-canvas"></canvas>

    <div class="pixel-bg">
        <div class="pixel"></div>
        <div class="pixel"></div>
        <div class="pixel"></div>
        <div class="pixel"></div>
        <div class="pixel"></div>
    </div>

    <div class="main-container">
        
        <img src="imagen/bocchi.png" alt="bocchi" class="bocchi-character">

        <div class="profile-card">
            <span class="profile-badge">&lt;Dev & Audiovisual /&gt;</span>
            
            <h1 class="profile-title">HAJIKOREI</h1>
            
            <div class="profile-description">
                Creador audiovisual y de páginas web bibliográficas. También hago contenido en TikTok muy variado y me considero un gran fan de <span>Uma Musume</span>. ¡Contactame si necesitas un proyecto ya sean videos o paginas web!
            </div>

            <div class="links-container">
                
                <a href="https://www.tiktok.com/@hajikorei?is_from_webapp=1&sender_device=pc" target="_blank" class="btn-link tiktok">
                    <span>TikTok</span>
                    <i class="fab fa-tiktok"></i>
                </a>

                <a href="https://www.instagram.com/hajikorei?igsh=ZG04dW1oenJ4Zm85" target="_blank" class="btn-link instagram">
                    <span>Instagram</span>
                    <i class="fab fa-instagram"></i>
                </a>

                <a href="https://www.facebook.com/share/1G3r4GWWvR/" target="_blank" class="btn-link facebook">
                    <span>Facebook</span>
                    <i class="fab fa-facebook-f"></i>
                </a>

                <a href="https://discord.gg/spCnMVCDY" target="_blank" class="btn-link discord">
                    <span>Discord</span>
                    <i class="fab fa-discord"></i>
                </a>

                <a href="https://x.com/JoseCan07199039" target="_blank" class="btn-link twitter-x">
                    <span>Twitter / X</span>
                    <i class="fa-brands fa-x-twitter"></i>
                </a>

            </div>
        </div>

    </div>

    <script>
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');

        let particles = [];
        const colors = ['#00f2fe', '#ff007f', '#a855f7', '#ffeb3b']; 
        
        // Control de tiempo para físicas uniformes (Delta Time)
        let lastTime = performance.now();

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        
        // Redimensionamiento controlado (evita lag al girar pantallas)
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(resizeCanvas, 100);
        });
        resizeCanvas();

        // Estela del ratón (Solo se genera si no se satura la pantalla)
        window.addEventListener('mousemove', function(e) {
            if (particles.length < 150) { 
                for(let i = 0; i < 2; i++) {
                    particles.push({
                        type: 'trail',
                        x: e.clientX,
                        y: e.clientY,
                        vx: (Math.random() - 0.5) * 1.5,
                        vy: (Math.random() - 0.5) * 1.5,
                        size: Math.random() * 1.5 + 1,
                        color: colors[Math.floor(Math.random() * colors.length)],
                        alpha: 1
                    });
                }
            }
        });

        // Explosión por click
        window.addEventListener('click', function(e) {
            const starCount = 20; // Cantidad óptima de estrellas
            for(let i = 0; i < starCount; i++) {
                let angle = (Math.PI * 2 / starCount) * i + (Math.random() - 0.3);
                let speed = Math.random() * 3 + 3;

                particles.push({
                    type: 'star',
                    x: e.clientX,
                    y: e.clientY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: Math.random() * 3 + 2,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    alpha: 1,
                    gravity: 0.1,
                    rotation: Math.random() * Math.PI,
                    rotSpeed: (Math.random() - 0.5) * 0.1
                });
            }
        });

        function drawStar(ctx, cx, cy, spikes, outerRadius, innerRadius, color) {
            let rot = Math.PI / 2 * 3;
            let x = cx;
            let y = cy;
            let step = Math.PI / spikes;

            ctx.beginPath();
            ctx.moveTo(cx, cy - outerRadius);
            for (let i = 0; i < spikes; i++) {
                x = cx + Math.cos(rot) * outerRadius;
                y = cy + Math.sin(rot) * outerRadius;
                ctx.lineTo(x, y);
                rot += step;

                x = cx + Math.cos(rot) * innerRadius;
                y = cy + Math.sin(rot) * innerRadius;
                ctx.lineTo(x, y);
                rot += step;
            }
            ctx.lineTo(cx, cy - outerRadius);
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

        // Bucle de renderizado a 60 FPS estables utilizando Delta Time
        function animate(currentTime) {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Factor multiplicador basado en tiempo para que corra igual en pantallas lentas o ultra rápidas
            let dt = (currentTime - lastTime) / 16.666; 
            if (dt > 2) dt = 2; // Evita saltos bruscos si la pestaña pierde foco
            lastTime = currentTime;

            // Renderizar la línea base del camino del mouse
            let trailParticles = particles.filter(p => p.type === 'trail');
            if (trailParticles.length > 1) {
                ctx.beginPath();
                ctx.moveTo(trailParticles[0].x, trailParticles[0].y);
                for (let i = 1; i < trailParticles.length; i++) {
                    ctx.lineTo(trailParticles[i].x, trailParticles[i].y);
                }
                ctx.strokeStyle = 'rgba(0, 242, 254, 0.08)';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            }

            // Actualización matemática en bloque único (Mucho más rápido)
            particles = particles.filter(p => {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                
                if (p.type === 'star') {
                    p.vy += p.gravity * dt;
                    p.rotation += p.rotSpeed * dt;
                    p.alpha -= 0.018 * dt;
                } else {
                    p.alpha -= 0.035 * dt;
                }

                if (p.alpha <= 0) return false;

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.shadowBlur = 6; // Sombra difusa reducida para ahorrar ciclos de GPU
                ctx.shadowColor = p.color;

                if (p.type === 'star') {
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation);
                    drawStar(ctx, 0, 0, 5, p.size, p.size / 2, p.color);
                } else {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.fill();
                }
                ctx.restore();
                return true;
            });

            requestAnimationFrame(animate);
        }

        requestAnimationFrame(animate);
    </script>

</body>
</html>
